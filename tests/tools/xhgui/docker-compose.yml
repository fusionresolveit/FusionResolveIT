services:
  xhgui:
    # https://hub.docker.com/r/xhgui/xhgui/tags
    image: docker.io/xhgui/xhgui:latest
    restart: always
    volumes:
      - ./config:/var/www/xhgui/config
    environment:
      - XHGUI_MONGO_HOSTNAME=mongo
      - XHGUI_MONGO_DATABASE=xhprof
    ports:
      - "8142:80"

  mongo:
    image: docker.io/percona/percona-server-mongodb:4.0
    # (case sensitive) engine: mmapv1, rocksdb, wiredTiger, inMemory
    command: --storageEngine=wiredTiger
    restart: always
    environment:
      - MONGO_INITDB_DATABASE=xhprof
    volumes:
      - ./mongo.init.d:/docker-entrypoint-initdb.d
      - mongodb:/data/db
    ports:
      - "27017:27017"

volumes:
  mongodb:

